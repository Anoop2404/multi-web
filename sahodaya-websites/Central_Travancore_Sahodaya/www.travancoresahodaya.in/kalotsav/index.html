<html lang="en" class="light">
    <!-- BEGIN: Head -->
    <head>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="dist/images/logo.svg" rel="shortcut icon">
        
        <title>Login - Kalotsav - CTSC </title>
        <!-- BEGIN: CSS Assets-->
        <link rel="stylesheet" href="dist/css/app.css" />
        <link rel="stylesheet" href="dist/css/style.css" />
        <!-- Google Recaptcha API CDN -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

<!-- Custom Scripts -->
<script src="rescript.js" defer></script>
        <!-- END: CSS Assets-->
    </head>
    
    <!-- END: Head -->
        
    <body class="login">

        <div class="container sm:px-10">
            <div class="block xl:grid grid-cols-2 gap-4">
                <!-- BEGIN: Login Info -->
                <div class="hidden xl:flex flex-col min-h-screen">
                    <a href="index.html" class="-intro-x flex items-center pt-5">
                        <img alt="" class="w-6" src="dist/images/logo.png">
                        <span class="text-white text-lg ml-3"> CTSC<span class="font-medium"> Kalotsav</span> </span>
                    </a>
                    <div class="my-auto">
                        <img alt="" class="-intro-x w-1/2 -mt-16" src="dist/images/logo.png">
                        <div class="-intro-x text-white font-medium text-4xl leading-tight mt-10">
                            Central Travancore 
                            <br>
                            Sahodaya Complex
                        </div>
                        <div class="-intro-x mt-5 text-lg text-white text-opacity-70 dark:text-gray-500">Kalotsav Management System</div>
                    </div>
                </div>
                <!-- END: Login Info -->
                <!-- BEGIN: Login Form -->
                <div class="h-screen xl:h-auto flex py-5 xl:py-0 my-10 xl:my-0">
                    <div class="my-auto mx-auto xl:ml-20 bg-white dark:bg-dark-1 xl:bg-transparent px-5 sm:px-8 py-8 xl:p-0 rounded-md shadow-md xl:shadow-none w-full sm:w-3/4 lg:w-2/4 xl:w-auto">
                       <center><img alt="" class="-intro-x w-1/2 -mt-16 mobilelogo" src="dist/images/logo.png" style="margin-top:10px;"> </center>
                    <h2 class="intro-x font-bold text-2xl xl:text-3xl text-center xl:text-left">
                            School Login
                        </h2>
                        <form method="POST" action="https://www.travancoresahodaya.in/kalotsav/checklogin.php" id="recaptcha-form">
                        <div class="intro-x mt-8">
                            <input type="text" class="intro-x login__input form-control py-3 px-4 border-gray-300 block" placeholder="Email" name="myusername">
                            <input type="password" class="intro-x login__input form-control py-3 px-4 border-gray-300 block mt-4" placeholder="Password" name="mypassword">
                        </div>
                        
                        <div class="intro-x mt-5 xl:mt-8 text-center xl:text-left">
                        <label style="color:red;" for="regular-form-3" class="mt-10 xl:mt-24 text-red-700"></label><br><br>
                            <!--button class="btn btn-primary py-3 px-4 w-full xl:w-32 xl:mr-3 align-top">Login</button-->
                            
                         
      

      <!-- Recaptcha -->
      <div
        class="g-recaptcha"
        data-sitekey="6LetalkiAAAAAK91H2deVVia2n7gbouWNDh0JM6U"
        data-callback="enableBtn"
        data-expired-callback="onRecaptchaResponseExpiry"
        data-error-callback="onRecaptchaError"
      ></div>

      <!-- Recaptcha Error -->
      <div
        id="recaptcha-form-error"
        style="display: none"
        class="bg-red-200 rounded py-1 px-2 text-sm sm:text-md"
      >
        Please fill the recaptcha checkbox.
      </div>

      <!-- Recaptcha Success -->
      <div
        id="recaptcha-form-success"
        style="display: none"
        class="bg-green-200 rounded py-1 px-2 text-sm sm:text-md"
      >
      
      </div>
      <br>
      <button class="btn btn-primary py-3 px-4 w-full xl:w-32 xl:mr-3 align-top" type="submit" id="button1">Submit</submit>
                        </div>
                    </form>
                        <div class="intro-x mt-10 xl:mt-24 text-gray-700 dark:text-gray-600 text-center xl:text-left">
                            For Support mail to
                            <br>
                            <a class="text-theme-1 dark:text-theme-10" href="index.html"></a> <a class="text-theme-1 dark:text-theme-10" href="mailto:support@travancoresahodaya.in">support@travancoresahodaya.in</a> 
                        </div>
                    </div>
                </div>
                <!-- END: Login Form -->
            </div>
        </div>
     
        <!-- BEGIN: JS Assets-->
        <script type="text/javascript">
             function enableBtn(){
                document.getElementById("recaptcha-form").submit();
 }
 </script>
        <script src="dist/js/app.js"></script>
        <!-- END: JS Assets-->
    </body>
